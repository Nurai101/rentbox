<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мои аренды — RentBox</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f7f7f7;
      color:#222;
    }

    header{
      background:white;
      border-bottom:1px solid #e5e5e5;
      padding:18px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
    }

    .logo{
      font-size:26px;
      font-weight:700;
    }

    nav{
      display:flex;
      gap:24px;
      flex-wrap:wrap;
    }

    nav a{
      text-decoration:none;
      color:#222;
      transition:0.3s;
    }

    nav a:hover{
      color:#666;
    }

    .page-title{
      padding:35px 60px 10px;
    }

    .page-title h1{
      font-size:36px;
      margin-bottom:10px;
    }

    .page-title p{
      color:#666;
      font-size:16px;
    }

    .orders-grid{
      padding:20px 60px 60px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:24px;
    }

    .order-card{
      background:white;
      border-radius:16px;
      padding:15px;
      box-shadow:0 4px 14px rgba(0,0,0,0.06);
      transition:0.3s;
      text-align:center;
    }

    .order-card:hover{
      transform:translateY(-4px);
    }

    .order-card img{
      width:100%;
      height:200px;
      object-fit:cover;
      border-radius:12px;
      margin-bottom:12px;
    }

    .order-card h3{
      font-size:20px;
      margin-bottom:10px;
    }

    .order-card p{
      color:#555;
      margin-bottom:8px;
      font-size:15px;
    }

    @media (max-width: 768px){
      header{
        padding:18px 24px;
      }

      .page-title{
        padding:30px 24px 10px;
      }

      .orders-grid{
        padding:20px 24px 40px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">RentBox</div>

    <nav>
    <a href="index.html">Главная</a>
    <a href="catalog.html">Каталог</a>
    <a href="add-item.html">Добавить товар</a>
    <a href="favorites.html">Избранное</a>
    <a href="profile.html">Профиль</a>
    <a href="my-orders.html">Мои аренды</a>
    <a href="#" onclick="logout()">Выйти</a>
    </nav>

  </header>

  <section class="page-title">
    <h1>Мои аренды</h1>
    <p>Здесь отображаются все товары, которые ты арендовала</p>
  </section>

  <div id="orders-container" class="orders-grid"></div>

    <script>
    if (!localStorage.getItem("currentUser")) {
    window.location.href = "login.html";
    }

    function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
    }
    </script>

  <script type="module" src="./js/orders/orders-main.js"></script>

</body>
</html>
