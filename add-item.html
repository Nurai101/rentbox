<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавить товар — RentBox</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f7f7f7;
      color:#222;
    }

    header{
      background:white;
      border-bottom:1px solid #e5e5e5;
      padding:18px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
    }

    .logo{
      font-size:26px;
      font-weight:700;
    }

    nav{
      display:flex;
      gap:24px;
      flex-wrap:wrap;
    }

    nav a{
      text-decoration:none;
      color:#222;
      transition:0.3s;
    }

    nav a:hover{
      color:#666;
    }

    .page-title{
      padding:35px 60px 10px;
    }

    .page-title h1{
      font-size:36px;
      margin-bottom:10px;
    }

    .page-title p{
      color:#666;
      font-size:16px;
    }

    .form-section{
      padding:20px 60px 60px;
      display:flex;
      justify-content:center;
    }

    .form-box{
      width:100%;
      max-width:700px;
      background:white;
      padding:30px;
      border-radius:18px;
      box-shadow:0 4px 14px rgba(0,0,0,0.06);
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      color:#333;
    }

    .form-group input,
    .form-group textarea{
      width:100%;
      padding:14px;
      border:1px solid #d9d9d9;
      border-radius:10px;
      font-size:15px;
      outline:none;
      transition:0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus{
      border-color:#999;
    }

    .form-group textarea{
      min-height:140px;
      resize:vertical;
    }

    .error{
      margin-top:6px;
      color:#c0392b;
      font-size:14px;
      min-height:18px;
    }

    .submit-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:black;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .submit-btn:hover{
      background:#333;
    }

    @media (max-width: 768px){
      header{
        padding:18px 24px;
      }

      .page-title{
        padding:30px 24px 10px;
      }

      .form-section{
        padding:20px 24px 40px;
      }

      .form-box{
        padding:22px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">RentBox</div>

    <nav>
    <a href="index.html">Главная</a>
    <a href="catalog.html">Каталог</a>
    <a href="add-item.html">Добавить товар</a>
    <a href="favorites.html">Избранное</a>
    <a href="profile.html">Профиль</a>
    <a href="my-orders.html">Мои аренды</a>
    <a href="#" onclick="logout()">Выйти</a>
    </nav>

  </header>

  <section class="page-title">
    <h1>Добавить товар</h1>
    <p>Заполните информацию о товаре, который хотите сдать в аренду</p>
  </section>

  <section class="form-section">
    <div class="form-box">
      <form id="add-item-form">

        <div class="form-group">
          <label for="title">Название товара</label>
          <input type="text" id="title" name="title" placeholder="Например, фотоаппарат Canon">
          <div class="error" data-error="title"></div>
        </div>

        <div class="form-group">
          <label for="category">Категория</label>
          <input type="text" id="category" name="category" placeholder="Например, техника">
          <div class="error" data-error="category"></div>
        </div>

        <div class="form-group">
          <label for="pricePerDay">Цена за день</label>
          <input type="number" id="pricePerDay" name="pricePerDay" placeholder="Например, 5000">
          <div class="error" data-error="pricePerDay"></div>
        </div>

        <div class="form-group">
          <label for="description">Описание</label>
          <textarea id="description" name="description" placeholder="Опишите состояние и особенности товара"></textarea>
          <div class="error" data-error="description"></div>
        </div>

        <div class="form-group">
          <label for="image">Ссылка на изображение</label>
          <input type="text" id="image" name="image" placeholder="Вставьте ссылку на фото">
          <div class="error" data-error="image"></div>
        </div>

        <button type="submit" class="submit-btn">Добавить товар</button>
      </form>
    </div>
  </section>

    <script>
    if (!localStorage.getItem("currentUser")) {
    window.location.href = "login.html";
    }

    function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
    }
    </script>



    <script type="module" src="./js/add-item-main.js"></script>

</body>
</html>
