<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — RentBox</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f7f7f7;
      color:#222;
    }

    header{
      background:white;
      border-bottom:1px solid #e5e5e5;
      padding:18px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
    }

    .logo{
      font-size:26px;
      font-weight:700;
    }

    nav{
      display:flex;
      gap:24px;
      flex-wrap:wrap;
    }

    nav a{
      text-decoration:none;
      color:#222;
      transition:0.3s;
    }

    nav a:hover{
      color:#666;
    }

    .page-title{
      padding:35px 60px 10px;
    }

    .page-title h1{
      font-size:36px;
      margin-bottom:10px;
    }

    .page-title p{
      color:#666;
      font-size:16px;
    }

    .profile-section{
      padding:20px 60px 60px;
    }

    .profile-card{
      background:white;
      border-radius:18px;
      padding:30px;
      box-shadow:0 4px 14px rgba(0,0,0,0.06);
      margin-bottom:30px;
    }

    #profile-info h2{
      font-size:28px;
      margin-bottom:10px;
    }

    #profile-info p{
      color:#555;
      font-size:16px;
      margin-bottom:8px;
    }

    .section-subtitle{
      font-size:28px;
      margin-bottom:20px;
    }

    .items-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:24px;
    }

    .item-card{
      background:white;
      border-radius:16px;
      padding:15px;
      box-shadow:0 4px 14px rgba(0,0,0,0.06);
      transition:0.3s;
      text-align:center;
    }

    .item-card:hover{
      transform:translateY(-4px);
    }

    .item-card img{
      width:100%;
      height:200px;
      object-fit:cover;
      border-radius:12px;
      margin-bottom:12px;
    }

    .item-card h3{
      font-size:20px;
      margin-bottom:10px;
    }

    .item-card p{
      color:#555;
      margin-bottom:8px;
      font-size:15px;
    }

    @media (max-width: 768px){
      header{
        padding:18px 24px;
      }

      .page-title{
        padding:30px 24px 10px;
      }

      .profile-section{
        padding:20px 24px 40px;
      }

      .profile-card{
        padding:22px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">RentBox</div>

    <nav>
    <a href="index.html">Главная</a>
    <a href="catalog.html">Каталог</a>
    <a href="add-item.html">Добавить товар</a>
    <a href="favorites.html">Избранное</a>
    <a href="profile.html">Профиль</a>
    <a href="my-orders.html">Мои аренды</a>
    <a href="#" onclick="logout()">Выйти</a>
    </nav>

  </header>

  <section class="page-title">
    <h1>Профиль пользователя</h1>
    <p>Здесь отображается информация об аккаунте и добавленных товарах</p>
  </section>

  <section class="profile-section">
    <div class="profile-card" id="profile-info"></div>

    <h2 class="section-subtitle">Мои товары</h2>
    <div id="profile-items" class="items-grid"></div>
  </section>

    <script>
    if (!localStorage.getItem("currentUser")) {
    window.location.href = "login.html";
    }

    function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
    }
    </script>


  <script type="module" src="./js/profile-main.js"></script>


</body>
</html>
