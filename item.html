<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар — RentBox</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f7f7f7;
      color:#222;
    }

    header{
      background:white;
      border-bottom:1px solid #e5e5e5;
      padding:18px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
    }

    .logo{
      font-size:26px;
      font-weight:700;
    }

    nav{
      display:flex;
      gap:24px;
      flex-wrap:wrap;
    }

    nav a{
      text-decoration:none;
      color:#222;
      transition:0.3s;
    }

    nav a:hover{
      color:#666;
    }

    .page-title{
      padding:35px 60px 10px;
    }

    .page-title h1{
      font-size:36px;
      margin-bottom:10px;
    }

    .page-title p{
      color:#666;
      font-size:16px;
    }

    .item-section{
      padding:20px 60px 60px;
    }

    .item-details{
      max-width:1100px;
      margin:0 auto;
      background:white;
      border-radius:20px;
      box-shadow:0 4px 14px rgba(0,0,0,0.06);
      padding:30px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:35px;
      align-items:start;
    }

    .item-details img{
      width:100%;
      height:420px;
      object-fit:cover;
      border-radius:16px;
    }

    .item-info h2{
      font-size:32px;
      margin-bottom:16px;
    }

    .item-info p{
      font-size:16px;
      line-height:1.7;
      color:#555;
      margin-bottom:12px;
    }

    #rent-btn{
      margin-top:20px;
      padding:14px 26px;
      border:none;
      border-radius:10px;
      background:black;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    #rent-btn:hover{
      background:#333;
    }

    @media (max-width: 900px){
      header{
        padding:18px 24px;
      }

      .page-title{
        padding:30px 24px 10px;
      }

      .item-section{
        padding:20px 24px 40px;
      }

      .item-details{
        grid-template-columns:1fr;
        padding:22px;
      }

      .item-details img{
        height:300px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">RentBox</div>

    <nav>
    <a href="index.html">Главная</a>
    <a href="catalog.html">Каталог</a>
    <a href="add-item.html">Добавить товар</a>
    <a href="favorites.html">Избранное</a>
    <a href="profile.html">Профиль</a>
    <a href="my-orders.html">Мои аренды</a>
    <a href="#" onclick="logout()">Выйти</a>
    </nav>

  </header>

  <section class="page-title">
    <h1>Информация о товаре</h1>
    <p>Подробное описание выбранного товара для аренды</p>
  </section>

  <section class="item-section">
    <div id="item-container"></div>
  </section>

  <script type="module" src="./js/item-main.js"></script>

  <script>
    function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
    }
    </script>

</body>
</html>
